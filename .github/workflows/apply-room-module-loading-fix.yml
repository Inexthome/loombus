name: Apply Room module loading fix

on:
  push:
    branches:
      - agent/fix-room-module-loading-flicker
    paths:
      - scripts/apply-room-module-loading-fix.py
      - .github/workflows/apply-room-module-loading-fix.yml

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repair branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-room-module-loading-flicker
          fetch-depth: 0

      - name: Apply deterministic source patch
        run: python scripts/apply-room-module-loading-fix.py

      - name: Verify patch formatting
        run: git diff --check

      - name: Commit only the product fix
        run: |
          rm scripts/apply-room-module-loading-fix.py
          rm .github/workflows/apply-room-module-loading-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/room-tier-modules-workspace.tsx scripts/apply-room-module-loading-fix.py .github/workflows/apply-room-module-loading-fix.yml
          git commit -m "Stabilize Room module loading states"
          git push origin HEAD:agent/fix-room-module-loading-flicker
