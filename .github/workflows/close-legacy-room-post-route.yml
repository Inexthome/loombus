name: Close legacy Room post route

on:
  push:
    branches:
      - agent/room-threaded-discussions
    paths:
      - scripts/close-legacy-room-post-route.py
      - .github/workflows/close-legacy-room-post-route.yml

permissions:
  contents: write

jobs:
  close-route:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out Room discussion branch
        uses: actions/checkout@v4
        with:
          ref: agent/room-threaded-discussions
          fetch-depth: 0

      - name: Close legacy create path
        run: python scripts/close-legacy-room-post-route.py

      - name: Verify patch formatting
        run: git diff --check

      - name: Commit only product change
        run: |
          rm scripts/close-legacy-room-post-route.py
          rm .github/workflows/close-legacy-room-post-route.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/api/rooms/'[roomId]'/route.ts scripts/close-legacy-room-post-route.py .github/workflows/close-legacy-room-post-route.yml
          git commit -m "Close legacy Room discussion creation path"
          git push origin HEAD:agent/room-threaded-discussions
