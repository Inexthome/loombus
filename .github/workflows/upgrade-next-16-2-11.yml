name: Upgrade Next.js 16.2.11

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/upgrade-next-16-2-11.yml

permissions:
  contents: write

jobs:
  upgrade-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out dependency branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Upgrade Next.js and matching ESLint config
        run: |
          npm install next@16.2.11 --save-exact
          npm install eslint-config-next@16.2.11 --save-dev --save-exact

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Verify diff integrity
        run: git diff --check

      - name: Commit validated dependency update
        run: |
          rm .github/workflows/upgrade-next-16-2-11.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json .github/workflows/upgrade-next-16-2-11.yml
          git commit -m "Upgrade Next.js to 16.2.11"
          git push origin HEAD:${{ github.head_ref }}
