name: One-time discussion picker fix

on:
  push:
    branches:
      - agent/discussion-filters-other-lane-fix
    paths:
      - .github/workflows/one-time-discussion-picker-fix.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/discussion-filters-other-lane-fix
          fetch-depth: 0

      - name: Apply targeted updates
        run: python scripts/apply-discussion-picker-fix.py

      - name: Commit targeted updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: agent/discussion-filters-other-lane-fix
          commit_message: Activate discussion links and enforce exclusive Other framing
          file_pattern: src/app/discussions/page.tsx src/app/saved/page.tsx src/app/create/create-v2-client-page.tsx src/app/api/discussions/create/route.ts
