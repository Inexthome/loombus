name: Run Discussion audience relocation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  run-relocation:
    name: produce consolidated correction commit
    if: github.head_ref == 'correction/discussion-audience-settings'
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v6
        with:
          ref: correction/discussion-audience-settings
          fetch-depth: 0

      - name: Extract relocation scripts
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/relocate-discussion-audience-settings.yml')
          lines = source.read_text().splitlines()
          scripts = []
          index = 0

          while index < len(lines):
              if lines[index] == '        run: |':
                  index += 1
                  block = []
                  while index < len(lines):
                      line = lines[index]
                      if line and not line.startswith('          '):
                          break
                      block.append(line[10:] if line.startswith('          ') else '')
                      index += 1
                  scripts.append('\n'.join(block).rstrip() + '\n')
                  continue
              index += 1

          if len(scripts) != 3:
              raise SystemExit(f'Expected 3 relocation scripts, found {len(scripts)}')

          for number, script in enumerate(scripts):
              Path(f'/tmp/relocation-step-{number}.sh').write_text(script)
          PY

      - name: Apply and validate correction
        run: |
          bash /tmp/relocation-step-0.sh
          bash /tmp/relocation-step-1.sh

      - name: Commit final correction
        run: |
          git rm .github/workflows/run-discussion-audience-relocation-on-pr.yml
          bash /tmp/relocation-step-2.sh
