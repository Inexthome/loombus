name: Harden Customer Support isolation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  harden:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out isolation branch
        uses: actions/checkout@v4
        with:
          ref: agent/customer-support-isolation
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply strict privacy hardening
        run: python3 .github/scripts/harden_customer_support_isolation.py

      - name: Verify privacy invariants
        run: |
          grep -q "Customer Support Rooms cannot be converted to a shared Room type" supabase/migrations/20260725013000_enforce_customer_support_thread_isolation.sql
          grep -q "old.visibility_scope = 'author_and_staff'" supabase/migrations/20260725013000_enforce_customer_support_thread_isolation.sql
          grep -q 'select("user_id, role, status, suspended_until")' 'src/app/api/rooms/[roomId]/discussions/route.ts'
          grep -q "authorized Room staff can change its status" 'src/app/api/rooms/[roomId]/discussions/route.ts'

      - name: Install locked dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://build-placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: build-placeholder-anon-key
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Commit hardening and remove one-time automation
        run: |
          rm .github/scripts/harden_customer_support_isolation.py
          rm .github/workflows/harden-customer-support-isolation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src supabase .github/scripts/harden_customer_support_isolation.py .github/workflows/harden-customer-support-isolation.yml
          git commit -m "Harden Customer Support isolation invariants"
          git push origin HEAD:agent/customer-support-isolation
