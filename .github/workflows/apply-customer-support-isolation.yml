name: Apply Customer Support isolation

on:
  push:
    branches:
      - agent/customer-support-isolation
    paths:
      - .github/workflows/apply-customer-support-isolation.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out isolation branch
        uses: actions/checkout@v4
        with:
          ref: agent/customer-support-isolation
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply application patches
        run: python3 .github/scripts/apply_customer_support_isolation.py

      - name: Install locked dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Commit product changes and remove one-time automation
        run: |
          rm .github/scripts/apply_customer_support_isolation.py
          rm .github/workflows/apply-customer-support-isolation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src supabase .github/scripts/apply_customer_support_isolation.py .github/workflows/apply-customer-support-isolation.yml
          git commit -m "Enforce private Customer Support cases"
          git push origin HEAD:agent/customer-support-isolation
