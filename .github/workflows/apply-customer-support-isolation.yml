# One-time branch automation. Removed after a successful validated patch.
name: Apply Customer Support isolation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out isolation branch
        uses: actions/checkout@v4
        with:
          ref: agent/customer-support-isolation
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Correct audited isolation patch anchor
        run: python3 .github/scripts/fix_customer_support_isolation_anchor.py

      - name: Apply application patches
        id: patch
        continue-on-error: true
        run: python3 .github/scripts/apply_customer_support_isolation.py > isolation-patch-output.txt 2>&1

      - name: Upload isolation patch diagnostic
        if: steps.patch.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: customer-support-isolation-patch-output
          path: isolation-patch-output.txt
          retention-days: 1

      - name: Stop after a strict patch mismatch
        if: steps.patch.outcome == 'failure'
        run: |
          cat isolation-patch-output.txt
          exit 1

      - name: Place required behavior in Settings panel
        run: python3 .github/scripts/fix_customer_support_generated_code.py

      - name: Install locked dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        id: build
        continue-on-error: true
        run: npm run build > isolation-build-output.txt 2>&1

      - name: Upload isolation build diagnostic
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: customer-support-isolation-build-output
          path: isolation-build-output.txt
          retention-days: 1

      - name: Stop after a build failure
        if: steps.build.outcome == 'failure'
        run: |
          tail -n 120 isolation-build-output.txt
          exit 1

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Commit product changes and remove one-time automation
        run: |
          rm .github/scripts/apply_customer_support_isolation.py
          rm .github/scripts/fix_customer_support_isolation_anchor.py
          rm .github/scripts/fix_customer_support_generated_code.py
          rm .github/workflows/apply-customer-support-isolation.yml
          rm -f .github/placeholder.txt isolation-patch-output.txt isolation-build-output.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src supabase .github/scripts/apply_customer_support_isolation.py .github/scripts/fix_customer_support_isolation_anchor.py .github/scripts/fix_customer_support_generated_code.py .github/workflows/apply-customer-support-isolation.yml .github/placeholder.txt
          git commit -m "Enforce private Customer Support cases"
          git push origin HEAD:agent/customer-support-isolation
