name: Apply mobile Create final corrections

on:
  push:
    branches:
      - agent/mobile-create-v2-polish
    paths:
      - .github/workflows/mobile-create-final-corrections.yml

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply corrections
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_required(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise RuntimeError(f"Missing expected source for {label}")
              return text.replace(old, new)

          adapter_path = Path("src/components/create-mobile-composer-adapter.tsx")
          adapter = adapter_path.read_text()

          adapter = replace_required(
              adapter,
              '''  .mc-context-chip[data-configured="true"]{
    border-color:color-mix(in srgb,var(--loombus-gold) 54%,var(--loombus-border));
    background:var(--loombus-gold-surface);
    color:var(--loombus-gold-deep);
  }
''',
              '''  .mc-context-chip[data-configured="true"]{
    border-color:color-mix(in srgb,var(--loombus-gold) 54%,var(--loombus-border));
    background:var(--loombus-gold-surface);
    color:var(--loombus-gold-deep);
  }

  .mc-context-chip--publish{
    margin-left:auto;
    border-color:var(--loombus-gold);
  }

  .mc-context-chip--publish:not(:disabled){
    background:var(--loombus-gold);
    color:var(--loombus-gold-contrast);
    box-shadow:0 .6rem 1.45rem var(--loombus-gold-soft);
  }

  .mc-context-chip--publish:disabled{
    cursor:not-allowed;
    border-color:var(--loombus-border);
    background:var(--loombus-surface-muted);
    color:var(--loombus-text-subtle);
    box-shadow:none;
    opacity:.72;
  }
''',
              "publish chip styles",
          )

          adapter = replace_required(
              adapter,
              '''        const add = createButton("Add", "mc-context-chip", () =>
          open("attachments")
        );
        mode.dataset.configured = "true";
        chipRow.append(topic, mode, add);
''',
              '''        const publish = createButton(
          "Publish",
          "mc-context-chip mc-context-chip--publish",
          () => {
            const originalPublish = originalButton(root!, ["Publish", "Publishing"]);
            if (originalPublish && !originalPublish.disabled) {
              originalPublish.click();
            }
          }
        );
        publish.disabled = true;
        publish.setAttribute(
          "aria-label",
          "Complete the required fields before publishing"
        );
        mode.dataset.configured = "true";
        chipRow.append(topic, mode, publish);
''',
              "replace Add chip with Publish",
          )

          adapter = replace_required(
              adapter,
              '''          const attachment = root.querySelector('[data-mc-role="attachments"]');
          const attachmentCount =
            attachment?.querySelectorAll('button[aria-label^="Remove "]').length ?? 0;
          setText(add, attachmentCount ? `Add · ${attachmentCount}` : "Add");
          add.dataset.configured = attachmentCount ? "true" : "false";
''',
              '''          const attachment = root.querySelector('[data-mc-role="attachments"]');
''',
              "remove Add attachment count",
          )

          adapter = replace_required(
              adapter,
              '''          publishAction.element.disabled = Boolean(originalPublish?.disabled);
''',
              '''          const publishDisabled = !originalPublish || Boolean(originalPublish.disabled);
          const isPublishing = Boolean(
            originalPublish?.textContent?.trim().startsWith("Publishing")
          );
          publishAction.element.disabled = publishDisabled;
          publish.disabled = publishDisabled;
          setText(publish, isPublishing ? "Publishing…" : "Publish");
          publish.dataset.configured = publishDisabled ? "false" : "true";
          publish.setAttribute(
            "aria-label",
            publishDisabled
              ? "Complete the required fields before publishing"
              : "Publish discussion"
          );
''',
              "sync Publish chip",
          )

          adapter_path.write_text(adapter)

          review_path = Path("src/app/create/review/review-client-page.tsx")
          review = review_path.read_text()

          review = replace_required(
              review,
              '''    { label: "Framing reviewed", done: Boolean(parsed.purpose.trim() || draft?.reality_lens?.trim() || draft?.purpose_lane?.trim()), helper: "Add a purpose, reality lens, or purpose lane before publishing." },
''',
              '''    { label: "Framing reviewed", done: true, helper: "Purpose, Reality Lens, and Purpose Lane are optional framing details." },
''',
              "make framing optional in readiness",
          )

          review = replace_required(
              review,
              '''className="inline-flex appearance-none items-center justify-center gap-2 rounded-2xl border border-amber-300 bg-amber-500 px-4 py-2 text-sm font-bold text-slate-950 shadow-sm transition hover:bg-amber-400 disabled:cursor-not-allowed disabled:opacity-50"''',
              '''className="inline-flex appearance-none items-center justify-center gap-2 rounded-2xl border border-[color:color-mix(in_srgb,var(--loombus-gold)_55%,var(--loombus-border))] bg-[var(--loombus-gold-surface)] px-4 py-2 text-sm font-bold text-[var(--loombus-text)] shadow-sm transition hover:border-[var(--loombus-gold)] hover:bg-[var(--loombus-surface-strong)] disabled:cursor-not-allowed disabled:text-[var(--loombus-text-subtle)] disabled:opacity-50"''',
              "theme Copy review draft button",
          )

          review_path.write_text(review)

          Path(".github/workflows/mobile-create-final-corrections.yml").unlink()
          PY

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm audit --omit=dev
      - run: git diff --check

      - name: Commit corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Correct mobile publish and review readiness"
          git push origin HEAD:${{ github.ref_name }}
