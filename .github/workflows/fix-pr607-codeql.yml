name: Fix PR607 CodeQL navigation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix-codeql-navigation:
    if: github.head_ref == 'agent/settings-profile-navigation-polish'
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - name: Checkout review branch
        uses: actions/checkout@v6
        with:
          ref: agent/settings-profile-navigation-polish
          fetch-depth: 0

      - name: Apply CodeQL-safe navigation correction
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/app/profile/profile-editor-client.tsx')
          text = path.read_text()

          def replace_once(old: str, new: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected one match, found {count}: {old[:120]!r}')
              text = text.replace(old, new, 1)

          replace_once(
              'import { type ChangeEvent, type FormEvent, type KeyboardEvent, useEffect, useState } from "react";\n',
              'import { type ChangeEvent, type FormEvent, type KeyboardEvent, useEffect, useState } from "react";\nimport { useRouter } from "next/navigation";\n',
          )
          replace_once(
              'export default function ProfilePage() {\n',
              'export default function ProfilePage() {\n  const router = useRouter();\n',
          )

          text = text.replace('pendingNavigationHref', 'pendingNavigationPath')
          text = text.replace('setPendingNavigationHref', 'setPendingNavigationPath')

          replace_once(
              '      setPendingNavigationPath(destination.href);\n',
              '      const relativeDestination = `${destination.pathname}${destination.search}${destination.hash}`;\n\n      if (!relativeDestination.startsWith("/") || relativeDestination.startsWith("//")) {\n        return;\n      }\n\n      setPendingNavigationPath(relativeDestination);\n',
          )

          redirect = '      window.location.href = destination;\n'
          if text.count(redirect) != 2:
              raise SystemExit(f'Expected two programmatic destination redirects, found {text.count(redirect)}')
          text = text.replace(redirect, '      router.push(destination);\n')

          path.write_text(text)
          PY

      - name: Remove temporary workflow
        run: rm .github/workflows/fix-pr607-codeql.yml

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/profile/profile-editor-client.tsx .github/workflows/fix-pr607-codeql.yml
          git commit -m "Fix CodeQL-safe profile navigation"
          git push origin HEAD:agent/settings-profile-navigation-polish
