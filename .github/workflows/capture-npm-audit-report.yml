name: Capture npm audit report

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/capture-npm-audit-report.yml

permissions:
  contents: write

jobs:
  capture-audit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out Room discussion branch
        uses: actions/checkout@v4
        with:
          ref: agent/room-threaded-discussions
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Capture production dependency audit
        run: npm audit --omit=dev --audit-level=high --json > npm-audit.json || true

      - name: Build concise audit summary
        run: |
          node <<'NODE'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('npm-audit.json', 'utf8'));
          const lines = [];
          lines.push(JSON.stringify(report.metadata?.vulnerabilities ?? {}, null, 2));
          for (const [name, item] of Object.entries(report.vulnerabilities ?? {})) {
            lines.push(`\nPACKAGE ${name}`);
            lines.push(`severity: ${item.severity}`);
            lines.push(`range: ${item.range}`);
            lines.push(`fixAvailable: ${JSON.stringify(item.fixAvailable)}`);
            lines.push(`via: ${JSON.stringify(item.via, null, 2)}`);
          }
          fs.writeFileSync('npm-audit-summary.txt', lines.join('\n'));
          NODE

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: |
            npm-audit.json
            npm-audit-summary.txt
          retention-days: 3

      - name: Remove diagnostic workflow
        run: |
          rm .github/workflows/capture-npm-audit-report.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/capture-npm-audit-report.yml
          git commit -m "Remove temporary npm audit diagnostic"
          git push origin HEAD:agent/room-threaded-discussions
