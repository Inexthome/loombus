name: Apply Room invite copy and paste fix

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

env:
  NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: build-only-placeholder

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out invite branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-room-invite-copy-and-paste
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply strict invite patch
        run: python3 .github/scripts/apply_room_invite_copy_and_paste.py

      - name: Verify invite invariants
        run: |
          grep -F 'Secure invitation link created. Copy it from the field below.' src/components/room-tier-modules-workspace.tsx
          grep -F 'Paste a Room invitation link.' src/app/rooms/live-rooms-client.tsx
          grep -F 'window.location.assign(`/rooms/join?token=${encodeURIComponent(token)}`);' src/app/rooms/live-rooms-client.tsx
          grep -F '.rooms-live-invite-entry {' src/app/rooms/rooms-live.css

      - name: Install locked dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Commit product changes and remove one-time automation
        run: |
          rm .github/scripts/apply_room_invite_copy_and_paste.py
          rm .github/workflows/apply-room-invite-copy-and-paste.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src .github/scripts/apply_room_invite_copy_and_paste.py .github/workflows/apply-room-invite-copy-and-paste.yml
          git commit -m "Fix Room invitation copy and paste flow"
          git push origin HEAD:agent/fix-room-invite-copy-and-paste
