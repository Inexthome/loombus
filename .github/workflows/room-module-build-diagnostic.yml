name: Room module build diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  capture-build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Capture production build
        shell: bash
        run: |
          set +e
          npm run build > room-module-build.log 2>&1
          status=$?
          echo "BUILD_EXIT_CODE=$status" >> room-module-build.log
          exit 0
      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: room-module-build-log
          path: room-module-build.log
          if-no-files-found: error
          retention-days: 1
