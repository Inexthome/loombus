name: Build settings and profile workspaces

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-workspaces:
    if: github.head_ref == 'polish/settings-profile-workspaces'
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v6
        with:
          ref: polish/settings-profile-workspaces
          fetch-depth: 0

      - name: Generate consolidated workspace update
        run: |
          python - <<'PY'
          from pathlib import Path

          Path('src/components/settings-preference-panels.tsx').write_text(r'''"use client";

import Link from "next/link";
import { Bell, Mail, MessageCircle, Smartphone } from "lucide-react";
import { useEffect, useState } from "react";
import { supabase } from "@/lib/supabase/client";

type Preferences = {
  repliesEnabled: boolean;
  followsEnabled: boolean;
  mentionsEnabled: boolean;
  followedDiscussionsEnabled: boolean;
  followedRepliesEnabled: boolean;
  emailDigestEnabled: boolean;
  emailDigestFrequency: "daily" | "weekly";
  pushMessagesEnabled: boolean;
  pushRepliesEnabled: boolean;
  pushFollowsEnabled: boolean;
  pushAdminReportsEnabled: boolean;
};

const defaults: Preferences = {
  repliesEnabled: true,
  followsEnabled: true,
  mentionsEnabled: true,
  followedDiscussionsEnabled: true,
  followedRepliesEnabled: false,
  emailDigestEnabled: false,
  emailDigestFrequency: "weekly",
  pushMessagesEnabled: true,
  pushRepliesEnabled: true,
  pushFollowsEnabled: true,
  pushAdminReportsEnabled: true,
};

function Toggle({ label, description, checked, disabled = false, onChange }: {
  label: string;
  description: string;
  checked: boolean;
  disabled?: boolean;
  onChange: (value: boolean) => void;
}) {
  return (
    <label className={`settings-v2-toggle-row${disabled ? " is-disabled" : ""}`}>
      <span className="settings-v2-toggle-copy"><strong>{label}</strong><span>{description}</span></span>
      <span className="settings-v2-switch"><input type="checkbox" checked={checked} disabled={disabled} onChange={(event) => onChange(event.target.checked)} /><span aria-hidden="true" /></span>
    </label>
  );
}

export function SettingsPreferencePanel({ scope }: { scope: "notifications" | "messages" | "delivery" }) {
  const [preferences, setPreferences] = useState(defaults);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [message, setMessage] = useState("");
  const [canUseEmailDigest, setCanUseEmailDigest] = useState(false);
  const [isAdmin, setIsAdmin] = useState(false);

  useEffect(() => {
    let alive = true;
    async function load() {
      const { data } = await supabase.auth.getSession();
      const token = data.session?.access_token;
      if (!token) return window.location.replace("/login?next=%2Fsettings");
      const response = await fetch("/api/settings/notification-preferences", { headers: { Authorization: `Bearer ${token}` }, cache: "no-store" });
      const result = await response.json().catch(() => ({}));
      if (!alive) return;
      if (!response.ok) setMessage(result.error ?? "Unable to load these preferences.");
      else {
        setPreferences({ ...defaults, ...(result.preferences ?? {}) });
        setCanUseEmailDigest(Boolean(result.canUseEmailDigest));
        setIsAdmin(Boolean(result.isAdmin));
      }
      setLoading(false);
    }
    void load();
    return () => { alive = false; };
  }, []);

  function update<K extends keyof Preferences>(key: K, value: Preferences[K]) {
    setPreferences((current) => ({ ...current, [key]: value }));
    setMessage("");
  }

  async function save() {
    if (saving) return;
    setSaving(true);
    setMessage("");
    try {
      const { data } = await supabase.auth.getSession();
      const token = data.session?.access_token;
      if (!token) return window.location.replace("/login?next=%2Fsettings");
      const response = await fetch("/api/settings/notification-preferences", {
        method: "POST",
        headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify(preferences),
      });
      const result = await response.json().catch(() => ({}));
      if (!response.ok) setMessage(result.error ?? "Unable to save these preferences.");
      else {
        setPreferences({ ...defaults, ...(result.preferences ?? {}) });
        setMessage("Preferences saved.");
      }
    } catch {
      setMessage("Unable to save these preferences. Try again.");
    } finally {
      setSaving(false);
    }
  }

  if (loading) return <div className="settings-v2-section-note">Loading preferences…</div>;

  return (
    <>
      {message ? <div className="settings-v2-notice">{message}</div> : null}
      {scope === "notifications" ? (
        <div className="settings-v2-toggle-list">
          <Toggle label="Replies to my discussions" description="Create Signal when someone replies to a discussion you started." checked={preferences.repliesEnabled} onChange={(value) => update("repliesEnabled", value)} />
          <Toggle label="New followers" description="Create Signal when another member follows you." checked={preferences.followsEnabled} onChange={(value) => update("followsEnabled", value)} />
          <Toggle label="Mentions" description="Create Signal when your member identity is mentioned." checked={preferences.mentionsEnabled} onChange={(value) => update("mentionsEnabled", value)} />
          <Toggle label="Followed members: discussions" description="Create Signal for new discussions from people you follow." checked={preferences.followedDiscussionsEnabled} onChange={(value) => update("followedDiscussionsEnabled", value)} />
          <Toggle label="Followed members: replies" description="Optionally create Signal for replies posted by people you follow." checked={preferences.followedRepliesEnabled} onChange={(value) => update("followedRepliesEnabled", value)} />
        </div>
      ) : null}

      {scope === "messages" ? (
        <div className="settings-workspace-stack">
          <Toggle label="Private-message push alerts" description="Send a device notification when a mutual connection sends you a private message." checked={preferences.pushMessagesEnabled} onChange={(value) => update("pushMessagesEnabled", value)} />
          <div className="settings-v2-section-note">Conversation-level mute, archive, report, and delete controls remain inside each private thread.</div>
          <Link href="/messages" className="settings-v2-secondary-action"><MessageCircle aria-hidden="true" /> Open Messages</Link>
        </div>
      ) : null}

      {scope === "delivery" ? (
        <div className="settings-v2-preference-grid">
          <section className="settings-v2-preference-group">
            <h3><Smartphone aria-hidden="true" /> Device delivery</h3>
            <div className="settings-v2-toggle-list">
              <Toggle label="Discussion replies" description="Send a device alert for replies to your discussions." checked={preferences.pushRepliesEnabled} onChange={(value) => update("pushRepliesEnabled", value)} />
              <Toggle label="New followers" description="Send a device alert when someone follows you." checked={preferences.pushFollowsEnabled} onChange={(value) => update("pushFollowsEnabled", value)} />
              {isAdmin ? <Toggle label="Admin report alerts" description="Send a device alert when a report needs review." checked={preferences.pushAdminReportsEnabled} onChange={(value) => update("pushAdminReportsEnabled", value)} /> : null}
            </div>
          </section>
          <section className="settings-v2-preference-group">
            <h3><Mail aria-hidden="true" /> Email digest</h3>
            <Toggle label="Email digest" description={canUseEmailDigest ? "Receive a summarized Signal digest by email." : "Email digest requires Premium or Admin access."} checked={preferences.emailDigestEnabled} disabled={!canUseEmailDigest} onChange={(value) => update("emailDigestEnabled", value)} />
            <label className="settings-v2-field">Digest frequency<select className="settings-v2-select" value={preferences.emailDigestFrequency} disabled={!canUseEmailDigest || !preferences.emailDigestEnabled} onChange={(event) => update("emailDigestFrequency", event.target.value === "daily" ? "daily" : "weekly")}><option value="weekly">Weekly</option><option value="daily">Daily</option></select></label>
          </section>
        </div>
      ) : null}

      <div className="settings-v2-savebar"><p>Changes take effect after saving.</p><button type="button" className="settings-v2-primary-action" disabled={saving} onClick={() => void save()}><Bell aria-hidden="true" /> {saving ? "Saving…" : "Save preferences"}</button></div>
    </>
  );
}
''')

          Path('src/components/settings-blocked-members-panel.tsx').write_text(r'''"use client";

import { Search, ShieldOff, UserRoundCheck } from "lucide-react";
import { useEffect, useMemo, useState } from "react";
import { ProfileAvatar, getProfileDisplayName } from "@/components/profile-avatar";
import { supabase } from "@/lib/supabase/client";

type Item = { blockId: string; blockedAt: string; profile: { id: string; full_name: string | null; username: string | null; avatar_url: string | null; bio: string | null }; profileAvailable: boolean };

export function SettingsBlockedMembersPanel() {
  const [items, setItems] = useState<Item[]>([]);
  const [query, setQuery] = useState("");
  const [loading, setLoading] = useState(true);
  const [workingId, setWorkingId] = useState<string | null>(null);
  const [message, setMessage] = useState("");

  async function load() {
    const { data } = await supabase.auth.getSession();
    const token = data.session?.access_token;
    if (!token) return window.location.replace("/login?next=%2Fsettings");
    const response = await fetch("/api/blocks", { headers: { Authorization: `Bearer ${token}` }, cache: "no-store" });
    const result = await response.json().catch(() => ({}));
    if (!response.ok) setMessage(result.error ?? "Unable to load blocked members.");
    else setItems(Array.isArray(result.items) ? result.items : []);
    setLoading(false);
  }

  useEffect(() => { void load(); }, []);

  const visible = useMemo(() => {
    const needle = query.trim().toLowerCase();
    if (!needle) return items;
    return items.filter((item) => [item.profile.full_name, item.profile.username, item.profile.bio].filter(Boolean).join(" ").toLowerCase().includes(needle));
  }, [items, query]);

  async function unblock(item: Item) {
    if (workingId) return;
    if (!window.confirm(`Unblock ${getProfileDisplayName(item.profile, "this member")}?`)) return;
    setWorkingId(item.profile.id);
    setMessage("");
    try {
      const { data } = await supabase.auth.getSession();
      const token = data.session?.access_token;
      if (!token) return window.location.replace("/login?next=%2Fsettings");
      const response = await fetch("/api/blocks/toggle", { method: "POST", headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" }, body: JSON.stringify({ targetUserId: item.profile.id, desiredState: false }) });
      const result = await response.json().catch(() => ({}));
      if (!response.ok || result.blocked) throw new Error(result.error ?? "Unable to unblock this member.");
      setItems((current) => current.filter((entry) => entry.profile.id !== item.profile.id));
      setMessage(`${getProfileDisplayName(item.profile, "The member")} was unblocked.`);
    } catch (error) {
      setMessage(error instanceof Error ? error.message : "Unable to unblock this member.");
    } finally {
      setWorkingId(null);
    }
  }

  if (loading) return <div className="settings-v2-section-note">Loading your private block list…</div>;

  return (
    <div className="settings-blocked-panel">
      {message ? <div className="settings-v2-notice">{message}</div> : null}
      <label className="settings-blocked-search"><Search aria-hidden="true" /><input type="search" value={query} onChange={(event) => setQuery(event.target.value)} placeholder="Search blocked members" /></label>
      {visible.length ? <div className="settings-blocked-list">{visible.map((item) => <article key={item.blockId}>
        <ProfileAvatar profile={item.profile} size="md" />
        <div><strong>{getProfileDisplayName(item.profile, "Unavailable member")}</strong><span>{item.profile.username ? `@${item.profile.username}` : "Profile unavailable"}</span></div>
        <button type="button" disabled={workingId === item.profile.id} onClick={() => void unblock(item)}><UserRoundCheck aria-hidden="true" /> {workingId === item.profile.id ? "Unblocking…" : "Unblock"}</button>
      </article>)}</div> : <div className="settings-blocked-empty"><ShieldOff aria-hidden="true" /><strong>{items.length ? "No matching blocked members" : "No blocked members"}</strong><span>Your block list is private to your account.</span></div>}
    </div>
  );
}
''')

          Path('src/components/settings-workspace-controller.tsx').write_text(r'''"use client";

import { createPortal } from "react-dom";
import Link from "next/link";
import { useEffect, useMemo, useState } from "react";
import { Bell, BookOpen, Clock3, CreditCard, Database, Eye, History, Lock, Mail, MessageCircle, Shield, ShieldOff, Sparkles, Trash2, User, Users } from "lucide-react";
import { SettingsPreferencePanel } from "@/components/settings-preference-panels";
import { SettingsBlockedMembersPanel } from "@/components/settings-blocked-members-panel";

type Section = "account" | "profile" | "appearance" | "data-history" | "messages" | "notifications" | "signal" | "topics" | "privacy" | "blocked-members" | "security" | "plan" | "reference" | "account-controls";

const sections: { key: Section; label: string; group: string; Icon: typeof User }[] = [
  { key: "account", label: "Account", group: "Account", Icon: User },
  { key: "profile", label: "Profile", group: "Account", Icon: Users },
  { key: "security", label: "Security", group: "Account", Icon: Lock },
  { key: "plan", label: "Plan", group: "Account", Icon: CreditCard },
  { key: "appearance", label: "Appearance", group: "Preferences", Icon: Eye },
  { key: "messages", label: "Messages", group: "Preferences", Icon: MessageCircle },
  { key: "notifications", label: "Notifications", group: "Preferences", Icon: Bell },
  { key: "signal", label: "Signal delivery", group: "Preferences", Icon: Mail },
  { key: "topics", label: "Topic alerts", group: "Preferences", Icon: Sparkles },
  { key: "privacy", label: "Privacy", group: "Privacy and data", Icon: Shield },
  { key: "blocked-members", label: "Blocked members", group: "Privacy and data", Icon: ShieldOff },
  { key: "data-history", label: "Data and history", group: "Privacy and data", Icon: Database },
  { key: "reference", label: "Reference", group: "Support and management", Icon: BookOpen },
  { key: "account-controls", label: "Account controls", group: "Support and management", Icon: Trash2 },
];

const existingIds = new Set(["appearance", "topics", "privacy", "security", "plan", "reference", "account-controls"]);

function Card({ eyebrow, title, description, children }: { eyebrow: string; title: string; description: string; children: React.ReactNode }) {
  return <section className="settings-v2-card settings-workspace-generated"><div className="settings-v2-card-header"><div><p className="settings-v2-eyebrow">{eyebrow}</p><h2>{title}</h2><p>{description}</p></div></div>{children}</section>;
}

export function SettingsWorkspaceController() {
  const [active, setActive] = useState<Section>("account");
  const [portalTarget, setPortalTarget] = useState<HTMLElement | null>(null);

  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const requested = params.get("section") as Section | null;
    if (requested && sections.some((section) => section.key === requested)) setActive(requested);
  }, []);

  useEffect(() => {
    const oldNav = document.querySelector<HTMLElement>(".settings-v2-nav");
    if (oldNav) oldNav.hidden = true;
    const main = document.querySelector<HTMLElement>(".settings-v2-main");
    if (!main) return;
    let slot = main.querySelector<HTMLElement>("[data-settings-workspace-slot]");
    if (!slot) {
      slot = document.createElement("div");
      slot.dataset.settingsWorkspaceSlot = "true";
      main.prepend(slot);
    }
    setPortalTarget(slot);
    return () => { slot?.remove(); if (oldNav) oldNav.hidden = false; };
  }, []);

  useEffect(() => {
    document.querySelectorAll<HTMLElement>(".settings-v2-main > .settings-v2-card").forEach((card) => {
      card.style.display = card.id === active && existingIds.has(active) ? "" : "none";
    });
    const url = new URL(window.location.href);
    url.searchParams.set("section", active);
    window.history.replaceState({}, "", url);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }, [active]);

  const groups = useMemo(() => [...new Set(sections.map((section) => section.group))], []);

  const generated = (() => {
    if (existingIds.has(active)) return null;
    if (active === "account") return <Card eyebrow="Private account" title="Account" description="Review account identity and open the correct workspace for account-level changes."><div className="settings-v2-resource-grid"><Link className="settings-v2-resource-link" href="/profile"><div><strong>Public identity</strong><span>Manage the profile connected to this account.</span></div></Link><Link className="settings-v2-resource-link" href="/settings?section=security"><div><strong>Sign-in and password</strong><span>Review provider, password, and account status.</span></div></Link><Link className="settings-v2-resource-link" href="/settings?section=plan"><div><strong>Subscription plan</strong><span>Review current access and premium capabilities.</span></div></Link><Link className="settings-v2-resource-link" href="/settings?section=account-controls"><div><strong>Account controls</strong><span>Deactivate or request deletion.</span></div></Link></div></Card>;
    if (active === "profile") return <Card eyebrow="Settings only" title="Profile settings" description="Profile settings summarize your public identity while the dedicated Profile workspace handles editing."><div className="settings-workspace-stack"><p className="settings-v2-card-copy">Your public name, username, bio, avatar, perspective marker, creator links, preview, and sharing tools are managed in Profile.</p><Link href="/profile" className="settings-v2-primary-action"><User aria-hidden="true" /> Open Profile workspace</Link></div></Card>;
    if (active === "messages") return <Card eyebrow="Private communication" title="Messages" description="Control message-specific delivery without duplicating conversation controls from the Messages workspace."><SettingsPreferencePanel scope="messages" /></Card>;
    if (active === "notifications") return <Card eyebrow="In-app Signal" title="Notifications" description="Choose which activity creates an item in your Signal Inbox."><SettingsPreferencePanel scope="notifications" /></Card>;
    if (active === "signal") return <Card eyebrow="Delivery channels" title="Signal delivery" description="Choose which Signal can reach your device or email outside the in-app inbox."><SettingsPreferencePanel scope="delivery" /></Card>;
    if (active === "blocked-members") return <Card eyebrow="Private boundaries" title="Blocked members" description="Review the members you blocked and restore access when appropriate."><SettingsBlockedMembersPanel /></Card>;
    if (active === "data-history") return <Card eyebrow="Account records" title="Data and history" description="Open the account-owned histories and libraries that already exist across Loombus."><div className="settings-v2-resource-grid"><Link className="settings-v2-resource-link" href="/my-activity"><div><strong>My Activity</strong><span>Combined discussions, replies, saved items, and Signal history.</span></div></Link><Link className="settings-v2-resource-link" href="/my-discussions"><div><strong>My Discussions</strong><span>Review discussions you created.</span></div></Link><Link className="settings-v2-resource-link" href="/my-replies"><div><strong>My Replies</strong><span>Review replies you posted.</span></div></Link><Link className="settings-v2-resource-link" href="/saved"><div><strong>Saved Library</strong><span>Bookmarks, folders, notes, and exports.</span></div></Link><Link className="settings-v2-resource-link" href="/reading-history"><div><strong>Reading History</strong><span>Review and clear viewed discussions where available.</span></div></Link><Link className="settings-v2-resource-link" href="/ai-usage"><div><strong>AI Usage</strong><span>Review limits, cached outputs, and recent AI activity.</span></div></Link></div><div className="settings-v2-section-note"><History aria-hidden="true" /> A full Download My Data package and login-history report are recommended as a later backend phase.</div></Card>;
    return null;
  })();

  return (
    <>
      <nav className="settings-workspace-nav" aria-label="Settings sections">
        {groups.map((group) => <div key={group} className="settings-workspace-nav-group"><p>{group}</p>{sections.filter((section) => section.group === group).map(({ key, label, Icon }) => <button type="button" key={key} className={active === key ? "is-active" : ""} aria-current={active === key ? "page" : undefined} onClick={() => setActive(key)}><Icon aria-hidden="true" /> {label}</button>)}</div>)}
      </nav>
      {portalTarget && generated ? createPortal(generated, portalTarget) : null}
    </>
  );
}
''')

          Path('src/components/profile-workspace-controller.tsx').write_text(r'''"use client";

import { Eye, Link2, Sparkles, User, Wrench } from "lucide-react";
import { useEffect, useState } from "react";

type Section = "overview" | "public" | "creator" | "preview";

const sections = [
  { key: "overview" as const, label: "Overview", Icon: Sparkles },
  { key: "public" as const, label: "Public profile", Icon: User },
  { key: "creator" as const, label: "Creator tools", Icon: Wrench },
  { key: "preview" as const, label: "Preview and sharing", Icon: Eye },
];

export function ProfileWorkspaceController() {
  const [active, setActive] = useState<Section>("overview");

  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const requested = params.get("section") as Section | null;
    if (requested && sections.some((section) => section.key === requested)) setActive(requested);
  }, []);

  useEffect(() => {
    const content = document.querySelector<HTMLElement>(".profile-workspace-content");
    if (!content) return;
    const directSections = [...content.querySelectorAll<HTMLElement>(":scope > section")];
    const publicLink = directSections[0] ?? null;
    const form = content.querySelector<HTMLFormElement>("form");
    const preview = content.querySelector<HTMLElement>("aside");
    const grid = form?.parentElement ?? null;
    const formSections = form ? [...form.querySelectorAll<HTMLElement>(":scope > section")] : [];
    const completion = formSections.find((section) => section.textContent?.includes("Profile completion")) ?? null;
    const publicProfile = formSections.find((section) => section.textContent?.includes("Public profile")) ?? null;
    const creator = formSections.find((section) => section.textContent?.includes("Creator / supporter tools")) ?? null;

    if (publicLink) publicLink.style.display = active === "overview" || active === "preview" ? "" : "none";
    formSections.forEach((section) => { section.style.display = "none"; });
    if (completion && active === "overview") completion.style.display = "";
    if (publicProfile && active === "public") publicProfile.style.display = "";
    if (creator && active === "creator") creator.style.display = "";
    if (form) form.style.display = active === "preview" ? "none" : "";
    if (preview) preview.style.display = active === "preview" ? "" : "none";
    if (grid) grid.classList.toggle("is-preview-only", active === "preview");
    const url = new URL(window.location.href);
    url.searchParams.set("section", active);
    window.history.replaceState({}, "", url);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }, [active]);

  return <nav className="profile-workspace-nav" aria-label="Profile sections"><p>Profile workspace</p>{sections.map(({ key, label, Icon }) => <button type="button" key={key} className={active === key ? "is-active" : ""} aria-current={active === key ? "page" : undefined} onClick={() => setActive(key)}><Icon aria-hidden="true" /> {label}</button>)}<a href="/settings?section=profile"><Link2 aria-hidden="true" /> Profile settings</a></nav>;
}
''')

          Path('src/app/settings/settings-workspace.css').write_text(r'''.settings-v2-layout { grid-template-columns: 240px minmax(0, 1fr); }
.settings-workspace-nav { position: sticky; top: 6rem; display: grid; gap: .85rem; padding: .85rem; border: 1px solid var(--loombus-border, rgba(81,67,39,.18)); border-radius: 1.35rem; background: var(--loombus-surface, #fffdf4); }
.settings-workspace-nav-group { display: grid; gap: .25rem; }
.settings-workspace-nav-group > p { margin: .2rem .65rem; color: var(--loombus-text-muted,#736a5b); font-size: .65rem; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; }
.settings-workspace-nav button { display: flex; align-items: center; gap: .65rem; width: 100%; padding: .68rem .72rem; border: 0; border-radius: .9rem; background: transparent; color: var(--loombus-text-muted,#736a5b); font: inherit; font-size: .78rem; font-weight: 800; text-align: left; cursor: pointer; }
.settings-workspace-nav button:hover, .settings-workspace-nav button.is-active { background: color-mix(in srgb,#cbab5b 14%,transparent); color: var(--loombus-text,#201b13); }
.settings-workspace-nav button.is-active { box-shadow: inset 3px 0 0 #cbab5b; }
.settings-workspace-nav svg { width: 1rem; height: 1rem; color: #a07c28; }
.settings-workspace-stack { display: grid; gap: .8rem; }
.settings-blocked-search { display: flex; align-items: center; gap: .55rem; padding: .75rem .85rem; border: 1px solid var(--loombus-border,rgba(81,67,39,.18)); border-radius: .95rem; background: var(--loombus-page-bg,#fefbec); }
.settings-blocked-search input { width: 100%; border: 0; outline: 0; background: transparent; color: var(--loombus-text,#201b13); font: inherit; }
.settings-blocked-list { display: grid; gap: .6rem; margin-top: .8rem; }
.settings-blocked-list article { display: grid; grid-template-columns: auto minmax(0,1fr) auto; align-items: center; gap: .75rem; padding: .8rem; border: 1px solid var(--loombus-border,rgba(81,67,39,.16)); border-radius: 1rem; background: var(--loombus-page-bg,#fefbec); }
.settings-blocked-list article div { min-width: 0; }
