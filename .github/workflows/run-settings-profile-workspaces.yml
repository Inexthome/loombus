name: Run settings and profile workspace generator

on:
  push:
    branches:
      - polish/settings-profile-workspaces

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v6
        with:
          ref: polish/settings-profile-workspaces
          fetch-depth: 0

      - name: Extract and run product generator
        run: |
          python - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/build-settings-profile-workspaces.yml').read_text()
          start_marker = "          python - <<'PY'\n"
          end_marker = "          PY\n\n      - name: Install dependencies"
          start = source.index(start_marker) + len(start_marker)
          end = source.index(end_marker, start)
          lines = source[start:end].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          Path('/tmp/generate-workspaces.py').write_text(script)
          PY
          python /tmp/generate-workspaces.py
          rm -f .github/workflows/run-settings-profile-workspaces.yml

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Commit consolidated product update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Polish Settings and Profile workspaces"
          git push origin HEAD:polish/settings-profile-workspaces
