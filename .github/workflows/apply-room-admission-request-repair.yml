name: Apply Room admission and operational request repair

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/repair-room-admission-and-operational-requests'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repair branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply strict admission and request patch
        run: python .github/scripts/apply_room_admission_request_repair.py

      - name: Verify Room workflow invariants
        run: |
          python - <<'PY'
          from pathlib import Path

          route = Path('src/app/api/rooms/[roomId]/modules/route.ts').read_text()
          ui = Path('src/components/room-tier-modules-workspace.tsx').read_text()
          entitlements = Path('src/lib/room-plan-entitlements.ts').read_text()

          checks = {
              'requests use generic request records': 'dataModule: "request"' in entitlements,
              'requests are member-facing': 'minimumRole: "member",\n    dataModule: "request"' in entitlements,
              'invites load join requests': 'joinRequests: await loadJoinRequests' in route,
              'paid requests do not load room applications': 'requestedModule === "requests"' not in route,
              'admission review is invite-bound': 'moduleKey !== "invites"' in route,
              'members can submit operational requests': '!access.canManage && moduleKey !== "requests"' in route,
              'request workflow statuses are validated': 'const managerStatuses = [' in route,
              'join requests render in invites': '<RequestsPanel requests={joinRequests} onReview={onReview} />' in ui,
              'request module uses records panel': 'requests={Array.isArray(data) ? (data as RequestItem[]) : []}' not in ui,
          }
          failed = [name for name, passed in checks.items() if not passed]
          if failed:
              raise SystemExit('Invariant failure: ' + ', '.join(failed))
          PY

      - name: Install locked dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: |
          export NEXT_PUBLIC_SUPABASE_URL="${NEXT_PUBLIC_SUPABASE_URL:-https://example.supabase.co}"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="${NEXT_PUBLIC_SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzAwMDAwMDAwLCJleHAiOjIwMDAwMDAwMDB9.dummy}"
          export SUPABASE_SERVICE_ROLE_KEY="${SUPABASE_SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE3MDAwMDAwMDAsImV4cCI6MjAwMDAwMDAwMH0.dummy}"
          export NEXT_PUBLIC_SITE_URL="${NEXT_PUBLIC_SITE_URL:-https://loombus.com}"
          npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Commit product changes and remove one-time automation
        run: |
          git config user.name "Inexthome"
          git config user.email "actions@users.noreply.github.com"
          git rm .github/scripts/apply_room_admission_request_repair.py
          git rm .github/workflows/apply-room-admission-request-repair.yml
          git add src/lib/room-plan-entitlements.ts
          git add 'src/app/api/rooms/[roomId]/modules/route.ts'
          git add src/components/room-tier-modules-workspace.tsx
          git add docs/rooms-entitlement-repair-order.md
          git commit -m "Separate Room admission from operational requests"
          git push origin HEAD:${{ github.head_ref }}
