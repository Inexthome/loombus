name: Normalize Customer Support Room type

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out isolation branch
        uses: actions/checkout@v4
        with:
          ref: agent/customer-support-isolation
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Normalize Customer Support Room types in SQL
        run: python3 .github/scripts/normalize_customer_support_room_type.py

      - name: Verify database normalization invariant
        run: |
          grep -q "room_type_is_customer_support" supabase/migrations/20260725013000_enforce_customer_support_thread_isolation.sql
          ! grep -q "room.room_type = 'customer_support'" supabase/migrations/20260725013000_enforce_customer_support_thread_isolation.sql
          ! grep -q "target_room_type = 'customer_support'" supabase/migrations/20260725013000_enforce_customer_support_thread_isolation.sql

      - name: Install locked dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://build-placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: build-placeholder-anon-key
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Commit normalization and remove one-time automation
        run: |
          rm .github/scripts/normalize_customer_support_room_type.py
          rm .github/workflows/normalize-customer-support-room-type.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase .github/scripts/normalize_customer_support_room_type.py .github/workflows/normalize-customer-support-room-type.yml
          git commit -m "Normalize Customer Support Room type enforcement"
          git push origin HEAD:agent/customer-support-isolation
