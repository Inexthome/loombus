name: Apply policy audit package

on:
  push:
    branches:
      - agent/audit-policy-pages-new-features
    paths:
      - ".policy-audit/chunks/**"
      - ".github/workflows/apply-policy-audit.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct audited replacement package
        shell: bash
        run: |
          set -euo pipefail
          echo "f75114f0ec89b94fc898f4f9ba8869e3cbed18760d84bba5255b9b46d2d77535  replacement-files.tar.gz" | sha256sum --check
          mkdir -p /tmp/loombus-policy
          tar -xzf replacement-files.tar.gz -C /tmp/loombus-policy
          cp -R /tmp/loombus-policy/replacement-files/. .

      - name: Validate audited source set
        shell: bash
        run: |
          set -euo pipefail
          targets=(
            src/components/public-policy-page.tsx
            src/app/about/page.tsx
            src/app/guidelines/page.tsx
            src/app/safety/page.tsx
            src/app/terms/page.tsx
            src/app/privacy/page.tsx
            src/app/cookies/page.tsx
            src/app/accessibility/page.tsx
            src/app/refunds/page.tsx
            src/app/dmca/page.tsx
            src/app/support/page.tsx
            src/app/support/support-v2-client.tsx
            src/app/settings/guide/page.tsx
            src/lib/platform-route-registry.ts
          )
          for file in "${targets[@]}"; do
            test -f "$file"
          done
          python - <<'PY'
          from pathlib import Path

          files = [
              Path("src/components/public-policy-page.tsx"),
              Path("src/app/about/page.tsx"),
              Path("src/app/guidelines/page.tsx"),
              Path("src/app/safety/page.tsx"),
              Path("src/app/terms/page.tsx"),
              Path("src/app/privacy/page.tsx"),
              Path("src/app/cookies/page.tsx"),
              Path("src/app/accessibility/page.tsx"),
              Path("src/app/refunds/page.tsx"),
              Path("src/app/dmca/page.tsx"),
              Path("src/app/support/page.tsx"),
              Path("src/app/support/support-v2-client.tsx"),
              Path("src/app/settings/guide/page.tsx"),
              Path("src/lib/platform-route-registry.ts"),
          ]
          offenders = [str(path) for path in files if "—" in path.read_text()]
          if offenders:
              raise SystemExit("Em dash found in: " + ", ".join(offenders))
          PY
          git diff --check

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production application
        run: npm run build

      - name: Commit audited replacements
        shell: bash
        run: |
          set -euo pipefail
          targets=(
            src/components/public-policy-page.tsx
            src/app/about/page.tsx
            src/app/guidelines/page.tsx
            src/app/safety/page.tsx
            src/app/terms/page.tsx
            src/app/privacy/page.tsx
            src/app/cookies/page.tsx
            src/app/accessibility/page.tsx
            src/app/refunds/page.tsx
            src/app/dmca/page.tsx
            src/app/support/page.tsx
            src/app/support/support-v2-client.tsx
            src/app/settings/guide/page.tsx
            src/lib/platform-route-registry.ts
          )
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "${targets[@]}"
          if git diff --cached --quiet; then
            echo "Audited replacement files already match the branch."
            exit 0
          fi
          git commit -m "Update public policies for complete Loombus platform"
          git push origin HEAD:agent/audit-policy-pages-new-features
