            to authenticated;
          grant execute on function public.get_discussion_audience_candidates()
            to authenticated;
          
          revoke all on function public.normalize_discussion_audience_preference()
            from public, anon, authenticated;
          
          notify pgrst, 'reload schema';
          
          commit;
