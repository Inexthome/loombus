name: Relocate Discussion audience controls

on:
  push:
    branches:
      - correction/discussion-audience-settings

permissions:
  contents: write

jobs:
  consolidate:
    name: build one reviewable correction
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v6
        with:
          ref: correction/discussion-audience-settings
          fetch-depth: 0

      - name: Move audience controls into Settings
        run: |
          mkdir -p src/components
          cat > src/app/create/page.tsx <<'CREATE_PAGE'
          import { CreateDiscussionAudiencePolicyGuard } from "@/components/create-discussion-audience-policy-guard";
          import { CreateDiscussionRefinements } from "@/components/create-discussion-refinements";
          import { CreatePublishGuard } from "@/components/create-publish-guard";
          import CreateV2ClientPage from "./create-v2-client-page";
          
          export default function CreatePage() {
            return (
              <CreatePublishGuard>
                <CreateDiscussionRefinements />
                <CreateDiscussionAudiencePolicyGuard />
                <CreateV2ClientPage />
              </CreatePublishGuard>
            );
          }
          CREATE_PAGE

          cat > src/app/settings/page.tsx <<'SETTINGS_PAGE'
          import { DiscussionAudienceSettingsBridge } from "@/components/discussion-audience-settings-bridge";
          import SettingsV2Client from "./settings-v2-client";
          
          export const dynamic = "force-dynamic";
          export const revalidate = 0;
          
          export default function SettingsPage() {
            return (
              <>
                <SettingsV2Client />
                <DiscussionAudienceSettingsBridge />
              </>
            );
          }
          SETTINGS_PAGE

          cat > src/components/discussion-audience-settings-bridge.tsx <<'SETTINGS_COMPONENT'
          "use client";
          
          import { createPortal } from "react-dom";
          import {
            Check,
            Globe2,
            LockKeyhole,
            Save,
            Search,
            SlidersHorizontal,
            UserCheck,
            UserMinus,
            UserRoundCheck,
            UsersRound,
            type LucideIcon,
          } from "lucide-react";
          import { useEffect, useMemo, useState } from "react";
          import { supabase } from "@/lib/supabase/client";
          
          type AudienceType =
            | "public"
            | "followers"
            | "connections"
            | "exclude_selected"
            | "selected"
            | "only_me"
            | "custom";
          
          type AudienceBase = "public" | "followers" | "connections";
          
          type AudienceCandidate = {
            id: string;
            full_name: string | null;
            username: string | null;
            avatar_url: string | null;
            follows_you: boolean;
            you_follow: boolean;
            is_connection: boolean;
          };
          
          type AudiencePreference = {
            default_audience_type: AudienceType | null;
            default_audience_base: AudienceBase | null;
            include_user_ids: string[] | null;
            exclude_user_ids: string[] | null;
          };
          
          const OPTIONS: Array<{
            type: AudienceType;
            label: string;
            description: string;
            Icon: LucideIcon;
          }> = [
            {
              type: "public",
              label: "Public",
              description: "Anyone can find and read future discussions.",
              Icon: Globe2,
            },
            {
              type: "followers",
              label: "Followers",
              description: "Only people who follow you can read them.",
              Icon: UsersRound,
            },
            {
              type: "connections",
              label: "Connections",
              description: "Only people you mutually follow can read them.",
              Icon: UserRoundCheck,
            },
            {
              type: "exclude_selected",
              label: "Don't show to",
              description: "Public except for the people you select.",
              Icon: UserMinus,
            },
            {
              type: "selected",
              label: "Only show to",
              description: "Only the people you select can read them.",
              Icon: UserCheck,
            },
            {
              type: "only_me",
              label: "Only me",
              description: "Future discussions stay private to your account.",
              Icon: LockKeyhole,
            },
            {
              type: "custom",
              label: "Custom",
              description: "Choose a base audience with include and exclude exceptions.",
              Icon: SlidersHorizontal,
            },
          ];
          
          function isAudienceType(value: unknown): value is AudienceType {
            return [
              "public",
              "followers",
              "connections",
              "exclude_selected",
              "selected",
              "only_me",
              "custom",
            ].includes(String(value));
          }
          
          function isAudienceBase(value: unknown): value is AudienceBase {
            return ["public", "followers", "connections"].includes(String(value));
          }
          
          function candidateName(candidate: AudienceCandidate) {
            return candidate.full_name?.trim() || candidate.username?.trim() || "Loombus member";
          }
          
          function candidateRelation(candidate: AudienceCandidate) {
            if (candidate.is_connection) return "Connection";
            if (candidate.follows_you) return "Follows you";
            return "You follow";
          }
          
          function createSettingsSlot() {
            const privacyCard = document.querySelector<HTMLElement>("#privacy.settings-v2-card");
            if (!privacyCard) return null;
          
            const existing = privacyCard.querySelector<HTMLElement>(
              "[data-discussion-audience-settings-slot]"
            );
            if (existing) return existing;
          
            const slot = document.createElement("div");
            slot.dataset.discussionAudienceSettingsSlot = "true";
            const header = privacyCard.querySelector<HTMLElement>(".settings-v2-card-header");
            header?.after(slot);
            return slot;
          }
          
          function CandidatePicker({
            candidates,
            selectedIds,
            onToggle,
            emptyMessage,
          }: {
            candidates: AudienceCandidate[];
            selectedIds: Set<string>;
            onToggle: (candidateId: string) => void;
            emptyMessage: string;
          }) {
            const [query, setQuery] = useState("");
            const filtered = useMemo(() => {
              const clean = query.trim().toLowerCase();
              if (!clean) return candidates;
          
              return candidates.filter((candidate) =>
                [candidate.full_name, candidate.username]
                  .filter(Boolean)
                  .join(" ")
                  .toLowerCase()
                  .includes(clean)
              );
            }, [candidates, query]);
          
            return (
              <div className="discussion-audience-settings-picker">
                <label className="discussion-audience-settings-search">
                  <Search aria-hidden="true" size={16} />
                  <input
                    value={query}
                    onChange={(event) => setQuery(event.target.value)}
                    placeholder="Search your followers and connections"
                  />
                </label>
          
                <div className="discussion-audience-settings-people" role="list">
                  {filtered.length === 0 ? (
                    <p className="discussion-audience-settings-empty">{emptyMessage}</p>
                  ) : (
                    filtered.map((candidate) => {
                      const selected = selectedIds.has(candidate.id);
                      return (
                        <button
                          key={candidate.id}
                          type="button"
                          className="discussion-audience-settings-person"
                          data-selected={selected ? "true" : "false"}
                          aria-pressed={selected}
                          onClick={() => onToggle(candidate.id)}
                        >
                          <span className="discussion-audience-settings-avatar" aria-hidden="true">
                            {candidate.avatar_url ? (
                              // eslint-disable-next-line @next/next/no-img-element
                              <img src={candidate.avatar_url} alt="" />
                            ) : (
                              candidateName(candidate).slice(0, 1).toUpperCase()
                            )}
                          </span>
                          <span className="discussion-audience-settings-person-copy">
                            <strong>{candidateName(candidate)}</strong>
                            <small>
                              {candidate.username ? `@${candidate.username} · ` : ""}
                              {candidateRelation(candidate)}
                            </small>
                          </span>
                          <span className="discussion-audience-settings-check" aria-hidden="true">
                            {selected ? <Check size={15} /> : null}
                          </span>
                        </button>
                      );
                    })
                  )}
                </div>
              </div>
            );
          }
          
          export function DiscussionAudienceSettingsBridge() {
            const [portalTarget, setPortalTarget] = useState<HTMLElement | null>(null);
            const [userId, setUserId] = useState<string | null>(null);
            const [capabilityReady, setCapabilityReady] = useState(false);
            const [loading, setLoading] = useState(true);
            const [audienceType, setAudienceType] = useState<AudienceType>("public");
            const [audienceBase, setAudienceBase] = useState<AudienceBase>("public");
            const [includeIds, setIncludeIds] = useState<Set<string>>(() => new Set());
            const [excludeIds, setExcludeIds] = useState<Set<string>>(() => new Set());
            const [candidates, setCandidates] = useState<AudienceCandidate[]>([]);
            const [message, setMessage] = useState("");
            const [saving, setSaving] = useState(false);
          
            useEffect(() => {
              let cancelled = false;
              let attempts = 0;
              let timer: number | null = null;
          
              function locate() {
                const slot = createSettingsSlot();
                if (slot) {
                  if (!cancelled) setPortalTarget(slot);
                  return;
                }
          
                attempts += 1;
                if (attempts < 40) timer = window.setTimeout(locate, 120);
              }
          
              locate();
          
              return () => {
                cancelled = true;
                if (timer) window.clearTimeout(timer);
                document
                  .querySelector<HTMLElement>("[data-discussion-audience-settings-slot]")
                  ?.remove();
              };
            }, []);
          
            useEffect(() => {
              let cancelled = false;
          
              async function loadSettings() {
                const { data: userResult } = await supabase.auth.getUser();
                const user = userResult.user;
          
                if (!user || cancelled) {
                  setLoading(false);
                  return;
                }
          
                setUserId(user.id);
          
                const { data: capability, error: capabilityError } = await supabase.rpc(
                  "get_discussion_audience_capability"
                );
                const ready = capability === true && !capabilityError;
          
                if (cancelled) return;
                setCapabilityReady(ready);
          
                if (!ready) {
                  setLoading(false);
                  return;
                }
          
                const [{ data: preference, error: preferenceError }, { data: candidateRows }] =
                  await Promise.all([
                    supabase
                      .from("discussion_audience_preferences")
                      .select(
                        "default_audience_type, default_audience_base, include_user_ids, exclude_user_ids"
                      )
                      .eq("user_id", user.id)
                      .maybeSingle(),
                    supabase.rpc("get_discussion_audience_candidates"),
                  ]);
          
                if (cancelled) return;
          
                if (preferenceError) {
                  setMessage("Future Discussion visibility could not load.");
                  setLoading(false);
                  return;
                }
          
                const saved = (preference ?? null) as AudiencePreference | null;
                const savedType = saved?.default_audience_type;
                const savedBase = saved?.default_audience_base;
                setAudienceType(isAudienceType(savedType) ? savedType : "public");
                setAudienceBase(isAudienceBase(savedBase) ? savedBase : "public");
                setIncludeIds(
                  new Set(
                    Array.isArray(saved?.include_user_ids)
                      ? saved.include_user_ids.filter((id) => typeof id === "string")
                      : []
                  )
                );
                setExcludeIds(
                  new Set(
                    Array.isArray(saved?.exclude_user_ids)
                      ? saved.exclude_user_ids.filter((id) => typeof id === "string")
                      : []
                  )
                );
                setCandidates((candidateRows ?? []) as AudienceCandidate[]);
                setLoading(false);
              }
          
              void loadSettings();
          
              return () => {
                cancelled = true;
              };
            }, []);
          
            const selectedOption =
              OPTIONS.find((option) => option.type === audienceType) ?? OPTIONS[0];
            const SelectedIcon = selectedOption.Icon;
            const restricted = audienceType !== "public";
          
            function toggleInclude(candidateId: string) {
              setIncludeIds((current) => {
                const next = new Set(current);
                if (next.has(candidateId)) next.delete(candidateId);
                else next.add(candidateId);
                return next;
              });
              setExcludeIds((current) => {
                if (!current.has(candidateId)) return current;
                const next = new Set(current);
                next.delete(candidateId);
                return next;
              });
              setMessage("");
            }
          
            function toggleExclude(candidateId: string) {
              setExcludeIds((current) => {
                const next = new Set(current);
                if (next.has(candidateId)) next.delete(candidateId);
                else next.add(candidateId);
                return next;
              });
              setIncludeIds((current) => {
                if (!current.has(candidateId)) return current;
                const next = new Set(current);
                next.delete(candidateId);
                return next;
              });
              setMessage("");
            }
          
            async function savePreference() {
              if (!capabilityReady || !userId || saving) return;
          
              if (audienceType === "selected" && includeIds.size === 0) {
                setMessage("Choose at least one person for Only show to.");
                return;
              }
          
              if (audienceType === "exclude_selected" && excludeIds.size === 0) {
                setMessage("Choose at least one person for Don't show to.");
                return;
              }
          
              const nextIncludeIds =
                audienceType === "selected" || audienceType === "custom"
                  ? [...includeIds].filter((id) => !excludeIds.has(id)).slice(0, 250)
                  : [];
              const nextExcludeIds =
                audienceType === "exclude_selected" || audienceType === "custom"
                  ? [...excludeIds].slice(0, 250)
                  : [];
          
              setSaving(true);
              setMessage("");
          
              const { data, error } = await supabase
                .from("discussion_audience_preferences")
                .upsert(
                  {
                    user_id: userId,
                    default_audience_type: audienceType,
                    default_audience_base: audienceType === "custom" ? audienceBase : null,
                    include_user_ids: nextIncludeIds,
                    exclude_user_ids: nextExcludeIds,
                    updated_at: new Date().toISOString(),
                  },
                  { onConflict: "user_id" }
                )
                .select(
                  "default_audience_type, default_audience_base, include_user_ids, exclude_user_ids"
                )
                .single();
          
              setSaving(false);
          
              if (error || !data) {
                setMessage(error?.message || "Unable to save future Discussion visibility.");
                return;
              }
          
              const saved = data as AudiencePreference;
              setAudienceType(
                isAudienceType(saved.default_audience_type)
                  ? saved.default_audience_type
                  : "public"
              );
              setAudienceBase(
                isAudienceBase(saved.default_audience_base)
                  ? saved.default_audience_base
                  : "public"
              );
              setIncludeIds(new Set(saved.include_user_ids ?? []));
              setExcludeIds(new Set(saved.exclude_user_ids ?? []));
              setMessage(
                "Future Discussion visibility saved. Existing discussions were not changed."
              );
            }
          
            if (!portalTarget) return null;
          
            return createPortal(
              <section className="discussion-audience-settings-panel" aria-label="Future Discussion visibility">
                <div className="discussion-audience-settings-heading">
                  <div>
                    <p className="discussion-audience-settings-eyebrow">
                      Future Discussion visibility
                    </p>
                    <h3>Choose who can see discussions you create in the future.</h3>
                    <p>
                      This is an account setting, not a Create-page choice. Saving it applies
                      automatically to new discussions and does not change existing discussions.
                    </p>
                  </div>
                  <span className="discussion-audience-settings-current">
                    <SelectedIcon aria-hidden="true" size={16} />
                    {selectedOption.label}
                  </span>
                </div>
          
                {loading ? (
                  <div className="discussion-audience-settings-notice">Loading visibility settings…</div>
                ) : null}
          
                {!loading && !capabilityReady ? (
                  <div className="discussion-audience-settings-notice is-warning">
                    The revised Supabase migrations must be applied before this setting can be saved.
                    Public remains the only active behavior until then.
                  </div>
                ) : null}
          
                <div className="discussion-audience-settings-options">
                  {OPTIONS.map(({ type, label, description, Icon }) => {
                    const selected = audienceType === type;
                    return (
                      <button
                        key={type}
                        type="button"
                        disabled={!capabilityReady || saving}
                        className="discussion-audience-settings-option"
                        data-selected={selected ? "true" : "false"}
                        aria-pressed={selected}
                        onClick={() => {
                          setAudienceType(type);
                          setMessage("");
                        }}
                      >
                        <Icon aria-hidden="true" size={20} />
                        <span>
                          <strong>{label}</strong>
                          <small>{description}</small>
                        </span>
                        <span className="discussion-audience-settings-radio" aria-hidden="true">
                          {selected ? <Check size={14} /> : null}
                        </span>
                      </button>
                    );
                  })}
                </div>
          
                {capabilityReady && audienceType === "selected" ? (
                  <div className="discussion-audience-settings-detail">
                    <div className="discussion-audience-settings-detail-copy">
                      <strong>Only these people</strong>
                      <span>{includeIds.size} selected</span>
                    </div>
                    <CandidatePicker
                      candidates={candidates}
                      selectedIds={includeIds}
                      onToggle={toggleInclude}
                      emptyMessage="Follow someone or gain a follower before choosing a person."
                    />
                  </div>
                ) : null}
          
                {capabilityReady && audienceType === "exclude_selected" ? (
                  <div className="discussion-audience-settings-detail">
                    <div className="discussion-audience-settings-detail-copy">
                      <strong>Hide future discussions from</strong>
                      <span>{excludeIds.size} selected</span>
                    </div>
                    <CandidatePicker
                      candidates={candidates}
                      selectedIds={excludeIds}
                      onToggle={toggleExclude}
                      emptyMessage="Follow someone or gain a follower before choosing a person."
                    />
                  </div>
                ) : null}
          
                {capabilityReady && audienceType === "custom" ? (
                  <div className="discussion-audience-settings-detail">
                    <label className="discussion-audience-settings-base">
                      <span>Base audience</span>
                      <select
                        value={audienceBase}
                        onChange={(event) =>
                          setAudienceBase(
                            isAudienceBase(event.target.value)
                              ? event.target.value
                              : "public"
                          )
                        }
                      >
                        <option value="public">Public</option>
                        <option value="followers">Followers</option>
                        <option value="connections">Connections</option>
                      </select>
                    </label>
          
                    <details className="discussion-audience-settings-exceptions">
                      <summary>
                        Always show to
                        <span>{includeIds.size}</span>
                      </summary>
                      <CandidatePicker
                        candidates={candidates}
                        selectedIds={includeIds}
                        onToggle={toggleInclude}
                        emptyMessage="No connected people are available."
                      />
                    </details>
          
                    <details className="discussion-audience-settings-exceptions">
                      <summary>
                        Don't show to
                        <span>{excludeIds.size}</span>
                      </summary>
                      <CandidatePicker
                        candidates={candidates}
                        selectedIds={excludeIds}
                        onToggle={toggleExclude}
                        emptyMessage="No connected people are available."
                      />
                    </details>
                  </div>
                ) : null}
          
                {restricted ? (
                  <div className="discussion-audience-settings-notice is-warning">
                    Restricted future discussions are text-only in this release because current
                    Discussion media uses public storage URLs. Set this to Public before creating
                    a discussion with files or Video Context.
                  </div>
                ) : null}
          
                {message ? (
                  <div className="discussion-audience-settings-notice">{message}</div>
                ) : null}
          
                <div className="discussion-audience-settings-savebar">
                  <p>Changes affect only discussions created after you save.</p>
                  <button
                    type="button"
                    className="settings-v2-primary-action"
                    disabled={!capabilityReady || saving}
                    onClick={() => void savePreference()}
                  >
                    <Save aria-hidden="true" size={16} />
                    {saving ? "Saving…" : "Save visibility setting"}
                  </button>
                </div>
              </section>,
              portalTarget
            );
          }
          SETTINGS_COMPONENT

          cat > src/components/create-discussion-audience-policy-guard.tsx <<'CREATE_GUARD'
          "use client";
          
          import { useEffect, useRef } from "react";
          import { supabase } from "@/lib/supabase/client";
          
          type AudiencePreference = {
            default_audience_type: string | null;
          };
          
          function jsonResponse(error: string, status: number) {
            return new Response(JSON.stringify({ error }), {
              status,
              headers: { "Content-Type": "application/json" },
            });
          }
          
          function getAttachmentSection() {
            const videoInput = document.querySelector<HTMLInputElement>(
              'main form input[type="file"][accept="video/*"]'
            );
            return videoInput?.closest<HTMLElement>("section") ?? null;
          }
          
          function hasStagedDiscussionAttachments() {
            const section = getAttachmentSection();
            return Boolean(section?.querySelector('button[aria-label^="Remove "]'));
          }
          
          function applyAttachmentPolicy(restricted: boolean) {
            const section = getAttachmentSection();
            if (!section) return;
          
            section.dataset.audienceRestricted = restricted ? "true" : "false";
            const actionGrid = section.querySelector<HTMLElement>(":scope > div.mt-4.grid");
            const buttons = actionGrid?.querySelectorAll<HTMLButtonElement>(":scope > button") ?? [];
          
            buttons.forEach((button) => {
              button.disabled = restricted;
              button.title = restricted
                ? "Your Future Discussion visibility setting is restricted. Attachments require Public."
                : "";
            });
          
            section
              .querySelector<HTMLElement>("[data-discussion-audience-policy-note]")
              ?.remove();
          
            if (!restricted) return;
          
            const note = document.createElement("div");
            note.dataset.discussionAudiencePolicyNote = "true";
            note.className = "discussion-audience-create-policy-note";
            note.append(
              "Attachments are unavailable because your Future Discussion visibility setting is restricted. "
            );
          
            const link = document.createElement("a");
            link.href = "/settings#privacy";
            link.textContent = "Change it in Settings";
            note.append(link);
            section.append(note);
          }
          
          export function CreateDiscussionAudiencePolicyGuard() {
            const restrictedRef = useRef(false);
          
            useEffect(() => {
              let cancelled = false;
              let locateTimer: number | null = null;
          
              async function loadPolicy() {
                const { data: userResult } = await supabase.auth.getUser();
                const user = userResult.user;
          
                if (!user || cancelled) {
                  restrictedRef.current = false;
                  applyAttachmentPolicy(false);
                  return;
                }
          
                const { data: capability, error: capabilityError } = await supabase.rpc(
                  "get_discussion_audience_capability"
                );
          
                if (cancelled || capability !== true || capabilityError) {
                  restrictedRef.current = false;
                  applyAttachmentPolicy(false);
                  return;
                }
          
                const { data: preference } = await supabase
                  .from("discussion_audience_preferences")
                  .select("default_audience_type")
                  .eq("user_id", user.id)
                  .maybeSingle();
          
                if (cancelled) return;
          
                const audienceType =
                  (preference as AudiencePreference | null)?.default_audience_type ?? "public";
                restrictedRef.current = audienceType !== "public";
                applyAttachmentPolicy(restrictedRef.current);
              }
          
              function locateAndApply() {
                if (getAttachmentSection()) {
                  applyAttachmentPolicy(restrictedRef.current);
                  return;
                }
                locateTimer = window.setTimeout(locateAndApply, 120);
              }
          
              void loadPolicy().then(locateAndApply);
          
              const originalFetch = window.fetch.bind(window);
              const guardedFetch: typeof window.fetch = async (input, init) => {
                const inputUrl =
                  typeof input === "string"
                    ? input
                    : input instanceof URL
                      ? input.href
                      : input.url;
                let pathname = inputUrl;
          
                try {
                  pathname = new URL(inputUrl, window.location.origin).pathname;
                } catch {
                  // Preserve the original value when URL parsing fails.
                }
          
                const method = String(
                  init?.method ?? (input instanceof Request ? input.method : "GET")
                ).toUpperCase();
          
                if (
                  restrictedRef.current &&
                  pathname === "/api/discussions/create" &&
                  method === "POST" &&
                  hasStagedDiscussionAttachments()
                ) {
                  return jsonResponse(
                    "Remove staged attachments or change Future Discussion visibility to Public in Settings.",
                    400
                  );
                }
          
                return originalFetch(input, init);
              };
          
              window.fetch = guardedFetch;
          
              function refreshPolicy() {
                if (document.visibilityState !== "hidden") void loadPolicy();
              }
          
              window.addEventListener("focus", refreshPolicy);
              document.addEventListener("visibilitychange", refreshPolicy);
          
              return () => {
                cancelled = true;
                if (locateTimer) window.clearTimeout(locateTimer);
                if (window.fetch === guardedFetch) window.fetch = originalFetch;
                window.removeEventListener("focus", refreshPolicy);
                document.removeEventListener("visibilitychange", refreshPolicy);
                applyAttachmentPolicy(false);
              };
            }, []);
          
            return null;
          }
          CREATE_GUARD

          cat > src/components/discussion-audience-detail-badge.tsx <<'DETAIL_BADGE'
          "use client";
          
          import { createPortal } from "react-dom";
          import {
            Globe2,
            LockKeyhole,
            SlidersHorizontal,
            UserCheck,
            UserMinus,
            UserRoundCheck,
            UsersRound,
          } from "lucide-react";
          import { useParams } from "next/navigation";
          import { useEffect, useState } from "react";
          import { supabase } from "@/lib/supabase/client";
          
          type AudienceType =
            | "public"
            | "followers"
            | "connections"
            | "exclude_selected"
            | "selected"
            | "only_me"
            | "custom";
          
          type AudienceRow = {
            audience_type: AudienceType | null;
            audience_base: "public" | "followers" | "connections" | null;
          };
          
          const LABELS: Record<AudienceType, string> = {
            public: "Public",
            followers: "Followers",
            connections: "Connections",
            exclude_selected: "Don't show to",
            selected: "Only show to",
            only_me: "Only me",
            custom: "Custom audience",
          };
          
          const ICONS = {
            public: Globe2,
            followers: UsersRound,
            connections: UserRoundCheck,
            exclude_selected: UserMinus,
            selected: UserCheck,
            only_me: LockKeyhole,
            custom: SlidersHorizontal,
          };
          
          function createAudienceBadgeSlot() {
            const topicRow = document.querySelector<HTMLElement>(
              ".discussion-v2-opening-card .discussion-v2-topic-row"
            );
            if (!topicRow) return null;
          
            const existing = topicRow.querySelector<HTMLElement>(
              "[data-discussion-audience-badge-slot]"
            );
            if (existing) return existing;
          
            const slot = document.createElement("span");
            slot.dataset.discussionAudienceBadgeSlot = "true";
            topicRow.append(slot);
            return slot;
          }
          
          export function DiscussionAudienceDetailBadge() {
            const params = useParams();
            const discussionId = String(params.id ?? "");
            const [portalTarget, setPortalTarget] = useState<HTMLElement | null>(null);
            const [audience, setAudience] = useState<AudienceRow | null>(null);
          
            useEffect(() => {
              let cancelled = false;
              let attempts = 0;
              let timer: number | null = null;
          
              function locate() {
                const slot = createAudienceBadgeSlot();
                if (slot) {
                  if (!cancelled) setPortalTarget(slot);
                  return;
                }
                attempts += 1;
                if (attempts < 30) timer = window.setTimeout(locate, 120);
              }
          
              locate();
              return () => {
                cancelled = true;
                if (timer) window.clearTimeout(timer);
                document
                  .querySelector<HTMLElement>("[data-discussion-audience-badge-slot]")
                  ?.remove();
              };
            }, []);
          
            useEffect(() => {
              let cancelled = false;
          
              async function loadAudience() {
                if (!discussionId) return;
                const { data, error } = await supabase
                  .from("discussions")
                  .select("audience_type, audience_base")
                  .eq("id", discussionId)
                  .maybeSingle();
          
                if (!cancelled && !error && data) setAudience(data as AudienceRow);
              }
          
              void loadAudience();
              return () => {
                cancelled = true;
              };
            }, [discussionId]);
          
            if (!portalTarget || !audience) return null;
          
            const type = audience.audience_type ?? "public";
            const Icon = ICONS[type];
            const customBase =
              type === "custom" && audience.audience_base
                ? ` · ${LABELS[audience.audience_base]}`
                : "";
          
            return createPortal(
              <span
                className="discussion-audience-detail-badge"
                title={`Audience: ${LABELS[type]}${customBase}`}
              >
                <Icon aria-hidden="true" size={14} />
                {LABELS[type]}
              </span>,
              portalTarget
            );
          }
