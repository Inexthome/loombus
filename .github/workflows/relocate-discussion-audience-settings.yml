          git add             src/app/create/page.tsx             src/app/settings/page.tsx             src/app/discussion-audience-controls.css             src/components/discussion-audience-settings-bridge.tsx             src/components/create-discussion-audience-policy-guard.tsx             src/components/discussion-audience-detail-badge.tsx             supabase/migrations/20260730100000_create_discussion_audience_controls.sql             supabase/migrations/20260730103000_bound_discussion_audience_selection.sql
          git add -u             src/components/create-discussion-audience-bridge.tsx             src/components/create-discussion-audience-public-fallback-guard.tsx
          git commit -m "Move future Discussion visibility into Settings"
          git push origin HEAD:correction/discussion-audience-settings
