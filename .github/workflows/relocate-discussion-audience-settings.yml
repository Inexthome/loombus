              raise SystemExit("Signed-out audience branch was not found")
          content = content.replace(old_signed_out, new_signed_out, 1)
          
          old_access_branch = """  if normalized_type = 'only_me' then
            return false;
          end if;
          
          if normalized_type = 'selected' then
          """
          new_access_branch = """  if normalized_type = 'only_me' then
            return false;
          end if;
          
          if normalized_type = 'exclude_selected' then
            return not explicitly_excluded;
          end if;
          
          if normalized_type = 'selected' then
          """
          if old_access_branch not in content:
              raise SystemExit("Audience access branch was not found")
          content = content.replace(old_access_branch, new_access_branch, 1)
          
          new_preference_function = r"""create or replace function public.apply_discussion_audience_metadata()
          returns trigger
          language plpgsql
          security definer
          set search_path = public
          as $$
          declare
            metadata jsonb := coalesce(new.discussion_metadata, '{}'::jsonb);
            preference_row record;
            requested_type text := 'public';
            requested_base text := 'public';
            include_ids uuid[] := '{}'::uuid[];
            exclude_ids uuid[] := '{}'::uuid[];
          begin
            select
              preference.default_audience_type,
              preference.default_audience_base,
              preference.include_user_ids,
              preference.exclude_user_ids
            into preference_row
            from public.discussion_audience_preferences preference
            where preference.user_id = new.user_id;
          
            if found then
              requested_type := lower(
                coalesce(nullif(preference_row.default_audience_type, ''), 'public')
              );
              requested_base := lower(
                coalesce(nullif(preference_row.default_audience_base, ''), 'public')
              );
              include_ids := coalesce(preference_row.include_user_ids, '{}'::uuid[]);
              exclude_ids := coalesce(preference_row.exclude_user_ids, '{}'::uuid[]);
            end if;
          
            if requested_type not in (
              'public',
              'followers',
              'connections',
              'exclude_selected',
              'selected',
              'only_me',
              'custom'
            ) then
              requested_type := 'public';
            end if;
          
            if requested_type = 'custom'
              and requested_base not in ('public', 'followers', 'connections')
            then
              requested_base := 'public';
            end if;
          
            new.audience_type := requested_type;
            new.audience_base := case
              when requested_type = 'custom' then requested_base
              else null
            end;
          
            if requested_type in ('selected', 'custom')
              and cardinality(include_ids) > 0
            then
              insert into public.discussion_audience_members (
                discussion_id,
                user_id,
                access_kind
              )
              select new.id, candidate_id, 'include'
              from unnest(include_ids) as candidate_id
              where candidate_id <> new.user_id
                and exists (
                  select 1
                  from auth.users account
                  where account.id = candidate_id
                )
                and not exists (
                  select 1
                  from public.user_blocks block
                  where (block.blocker_id = new.user_id and block.blocked_id = candidate_id)
                     or (block.blocker_id = candidate_id and block.blocked_id = new.user_id)
                )
              on conflict do nothing;
            end if;
          
            if requested_type in ('exclude_selected', 'custom')
              and cardinality(exclude_ids) > 0
            then
              insert into public.discussion_audience_members (
                discussion_id,
                user_id,
                access_kind
              )
              select new.id, candidate_id, 'exclude'
              from unnest(exclude_ids) as candidate_id
              where candidate_id <> new.user_id
                and exists (
                  select 1
                  from auth.users account
                  where account.id = candidate_id
                )
              on conflict do nothing;
            end if;
          
            new.discussion_metadata := metadata
              - '__audience_type'
              - '__audience_base'
              - '__audience_include_ids'
              - '__audience_exclude_ids';
          
            return new;
          end;
          $$;
          
          """
          
          pattern = re.compile(
              r"create or replace function public\.apply_discussion_audience_metadata\(\)\n"
              r"returns trigger\n.*?\n\$\$;\n\n"
              r"(?=drop trigger if exists apply_discussion_audience_metadata_trigger)",
              re.DOTALL,
          )
          content, replaced = pattern.subn(new_preference_function, content, count=1)
          if replaced != 1:
              raise SystemExit("Audience creation trigger function was not replaced")
          
          path.write_text(content)
          PATCH_MIGRATION

          rm -f             src/components/create-discussion-audience-bridge.tsx             src/components/create-discussion-audience-public-fallback-guard.tsx

          python - <<'VERIFY'
          from pathlib import Path
          
          create_page = Path("src/app/create/page.tsx").read_text()
          settings_page = Path("src/app/settings/page.tsx").read_text()
          migration = Path(
              "supabase/migrations/20260730100000_create_discussion_audience_controls.sql"
          ).read_text()
          
          assert "CreateDiscussionAudienceBridge" not in create_page
          assert "DiscussionAudienceSettingsBridge" in settings_page
          assert "exclude_selected" in migration
          assert "discussion_audience_preferences preference" in migration
          assert "__audience_type" not in create_page
          VERIFY

      - name: Validate correction
        run: |
          npm ci
          npm run lint
          npm run build

