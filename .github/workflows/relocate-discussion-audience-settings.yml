          -- Bound saved audience lists and keep relationship discovery private to signed-in members.
          
          begin;
          
          do $$
          begin
            if not exists (
              select 1
              from pg_constraint
              where conname = 'discussion_audience_preferences_include_limit_check'
                and conrelid = 'public.discussion_audience_preferences'::regclass
            ) then
              alter table public.discussion_audience_preferences
                add constraint discussion_audience_preferences_include_limit_check
                check (cardinality(include_user_ids) <= 250);
            end if;
          
            if not exists (
              select 1
              from pg_constraint
              where conname = 'discussion_audience_preferences_exclude_limit_check'
                and conrelid = 'public.discussion_audience_preferences'::regclass
            ) then
              alter table public.discussion_audience_preferences
                add constraint discussion_audience_preferences_exclude_limit_check
                check (cardinality(exclude_user_ids) <= 250);
            end if;
          end;
          $$;
          
          create or replace function public.normalize_discussion_audience_preference()
          returns trigger
          language plpgsql
          security definer
          set search_path = public
          as $$
          begin
            new.include_user_ids := array(
              select distinct candidate_id
              from unnest(coalesce(new.include_user_ids, '{}'::uuid[])) as candidate_id
              where candidate_id <> new.user_id
            );
          
            new.exclude_user_ids := array(
              select distinct candidate_id
              from unnest(coalesce(new.exclude_user_ids, '{}'::uuid[])) as candidate_id
              where candidate_id <> new.user_id
            );
          
            new.include_user_ids := array(
              select candidate_id
              from unnest(new.include_user_ids) as candidate_id
              where not (candidate_id = any(new.exclude_user_ids))
            );
          
            if new.default_audience_type not in ('selected', 'custom') then
              new.include_user_ids := '{}'::uuid[];
            end if;
          
            if new.default_audience_type not in ('exclude_selected', 'custom') then
              new.exclude_user_ids := '{}'::uuid[];
            end if;
          
            if new.default_audience_type = 'selected'
              and cardinality(new.include_user_ids) = 0
            then
              raise exception 'Choose at least one person for Only show to.'
                using errcode = '23514';
            end if;
          
            if new.default_audience_type = 'exclude_selected'
              and cardinality(new.exclude_user_ids) = 0
            then
              raise exception 'Choose at least one person for Don''t show to.'
                using errcode = '23514';
            end if;
          
            new.updated_at := now();
            return new;
          end;
          $$;
          
          drop trigger if exists normalize_discussion_audience_preference_trigger
            on public.discussion_audience_preferences;
          create trigger normalize_discussion_audience_preference_trigger
          before insert or update on public.discussion_audience_preferences
          for each row execute function public.normalize_discussion_audience_preference();
          
          create or replace function public.get_discussion_audience_candidates()
          returns table (
            id uuid,
            full_name text,
            username text,
            avatar_url text,
            follows_you boolean,
            you_follow boolean,
            is_connection boolean
          )
          language sql
          stable
          security definer
          set search_path = public
          as $$
            with viewer as (
              select auth.uid() as id
            ), relationships as (
              select
                profile.id,
                profile.full_name,
                profile.username,
                profile.avatar_url,
                exists (
                  select 1
                  from public.follows incoming
                  where incoming.follower_id = profile.id
                    and incoming.following_id = (select id from viewer)
                ) as follows_you,
                exists (
                  select 1
                  from public.follows outgoing
                  where outgoing.follower_id = (select id from viewer)
                    and outgoing.following_id = profile.id
                ) as you_follow
              from public.profiles profile
              where (select id from viewer) is not null
                and profile.id <> (select id from viewer)
                and coalesce(profile.account_status, 'active') not in (
                  'blocked', 'deleted', 'deactivated', 'suspended', 'banned', 'pending_deletion'
                )
                and (
                  exists (
                    select 1
                    from public.follows incoming
                    where incoming.follower_id = profile.id
                      and incoming.following_id = (select id from viewer)
                  )
                  or exists (
                    select 1
                    from public.follows outgoing
                    where outgoing.follower_id = (select id from viewer)
                      and outgoing.following_id = profile.id
                  )
                )
                and not exists (
                  select 1
                  from public.user_blocks block
                  where (block.blocker_id = profile.id and block.blocked_id = (select id from viewer))
                     or (block.blocker_id = (select id from viewer) and block.blocked_id = profile.id)
                )
            )
            select
              relationships.id,
              relationships.full_name,
              relationships.username,
              relationships.avatar_url,
              relationships.follows_you,
              relationships.you_follow,
              relationships.follows_you and relationships.you_follow as is_connection
            from relationships
            order by
              (relationships.follows_you and relationships.you_follow) desc,
              lower(coalesce(relationships.full_name, relationships.username, '')) asc
            limit 500;
          $$;
          
          revoke all on function public.get_discussion_audience_capability()
